name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9
        with:
          version: latest

  test:
    name: Test
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -v ./...

  build:
    name: Build
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd/hf-csi-driver/

  helm-lint:
    name: Helm Lint
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/hf-csi-driver/

  e2e-test:
    name: E2E Test
    needs: [build, helm-lint]
    runs-on:
      group: aws-general-8-plus
    env:
      KUBERNETES_SERVICE_HOST: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: azure/setup-helm@v4

      - name: Create Kind cluster
        run: |
          cat > /tmp/kind-config.yaml <<'KINDEOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraMounts:
            - hostPath: /dev/fuse
              containerPath: /dev/fuse
              propagation: None
          KINDEOF

          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          ./kind create cluster --name e2e --wait 60s \
            --kubeconfig "$HOME/.kube/kind-config" \
            --config /tmp/kind-config.yaml
          echo "KUBECONFIG=$HOME/.kube/kind-config" >> "$GITHUB_ENV"

      - name: Build and load image
        run: |
          docker build -t hf-csi-driver:test .
          ./kind load docker-image hf-csi-driver:test --name e2e

      - name: Install chart
        run: |
          helm install hf-csi deploy/helm/hf-csi-driver/ \
            --namespace default \
            --set image.repository=hf-csi-driver \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set mountMode=pod
          kubectl rollout status daemonset hf-csi-hf-csi-driver-node \
            --namespace default --timeout=60s

      - name: Verify resources
        run: |
          kubectl get csidriver hf.csi.huggingface.co
          kubectl get csidriver hf.csi.huggingface.co -o jsonpath='{.spec.attachRequired}' | grep false
          kubectl get csidriver hf.csi.huggingface.co -o jsonpath='{.spec.requiresRepublish}' | grep true
          kubectl -n default get pods -l app=hf-csi-node -o jsonpath='{.items[0].status.phase}' | grep Running

      - name: Mount test (public repo, no token)
        run: |
          kubectl create secret generic hf-token --from-literal=token=''

          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: test-pv
          spec:
            capacity:
              storage: 1Gi
            accessModes: [ReadOnlyMany]
            persistentVolumeReclaimPolicy: Retain
            csi:
              driver: hf.csi.huggingface.co
              volumeHandle: test-gpt2
              nodePublishSecretRef:
                name: hf-token
                namespace: default
              volumeAttributes:
                sourceType: repo
                sourceId: openai-community/gpt2
                revision: main
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: test-pvc
          spec:
            accessModes: [ReadOnlyMany]
            storageClassName: ""
            resources:
              requests:
                storage: 1Gi
            volumeName: test-pv
          ---
          apiVersion: v1
          kind: Pod
          metadata:
            name: test-mount
          spec:
            containers:
            - name: test
              image: busybox:latest
              command: ["sh", "-c", "ls /data && cat /data/config.json"]
              volumeMounts:
              - name: vol
                mountPath: /data
                readOnly: true
            volumes:
            - name: vol
              persistentVolumeClaim:
                claimName: test-pvc
            restartPolicy: Never
          EOF

          kubectl wait pod/test-mount \
            --for=jsonpath='{.status.phase}'=Succeeded --timeout=120s

      - name: Verify mount
        run: |
          kubectl logs test-mount | grep config.json
          kubectl logs test-mount | grep model_type

      - name: Verify mount pod and HFMount CRD
        run: |
          echo "=== Mount pods ==="
          kubectl get pods -l hf.csi.huggingface.co/app=hf-mount -n default
          MOUNT_PODS=$(kubectl get pods -l hf.csi.huggingface.co/app=hf-mount -n default -o jsonpath='{.items[*].metadata.name}')
          if [ -z "$MOUNT_PODS" ]; then
            echo "ERROR: No mount pods found"
            exit 1
          fi
          echo "Found mount pods: $MOUNT_PODS"

          echo "=== HFMount CRDs ==="
          kubectl get hfmounts -n default || true
          HFMOUNTS=$(kubectl get hfmounts -n default -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          if [ -z "$HFMOUNTS" ]; then
            echo "WARNING: No HFMount CRDs found (CRD tracking is best-effort)"
          else
            echo "Found HFMounts: $HFMOUNTS"
            kubectl get hfmounts -n default -o yaml
          fi

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== CSI driver logs ==="
          kubectl logs -l app=hf-csi-node --tail=100 -c hf-csi-plugin
          echo "=== Pod describe ==="
          kubectl describe pod test-mount
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp'
          echo "=== Mount pods ==="
          kubectl get pods -l hf.csi.huggingface.co/app=hf-mount -n default -o yaml 2>/dev/null || true
          echo "=== HFMount CRDs ==="
          kubectl get hfmounts -n default -o yaml 2>/dev/null || true
