name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/huggingface/hf-csi-driver
  HELM_CHART: deploy/helm/hf-csi-driver

jobs:
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Determine tags
        id: tags
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TAGS="${{ env.IMAGE }}:${TAG}"
          if [[ "$TAG" != *"-"* ]]; then
            TAGS="${TAGS},${{ env.IMAGE }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-22.04
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package and push
        run: |
          helm package ${{ env.HELM_CHART }} --version ${{ steps.version.outputs.tag }} --app-version ${{ steps.version.outputs.tag }}
          helm push hf-csi-driver-${{ steps.version.outputs.tag }}.tgz oci://${{ env.REGISTRY }}/huggingface/charts
