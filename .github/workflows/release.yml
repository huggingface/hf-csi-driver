name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/huggingface/hf-csi-driver
  HELM_CHART: deploy/helm/hf-csi-driver

jobs:
  release:
    name: Create Github release
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v4

      - name: Release
        id: release
        uses: huggingface/semver-release-action@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-22.04
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.release.outputs.tag }}
            ${{ env.IMAGE }}:latest

  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-22.04
    needs: release
    if: needs.release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Fetch latest hf-mount release tag
        id: hfmount
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api /repos/huggingface/hf-mount/releases/latest --jq .tag_name)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Substitute placeholders
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
          HFMOUNT_TAG: ${{ steps.hfmount.outputs.tag }}
        run: |
          sed -i "s/0.0.0-latest/${VERSION}/g" ${HELM_CHART}/Chart.yaml
          yq -i ".image.tag = \"${TAG}\"" ${HELM_CHART}/values.yaml
          yq -i ".webhook.image.tag = \"${TAG}\"" ${HELM_CHART}/values.yaml
          yq -i ".hfMount.image.tag = \"${HFMOUNT_TAG}\"" ${HELM_CHART}/values.yaml

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push
        run: |
          helm package ${HELM_CHART} --version ${{ needs.release.outputs.version }} --app-version ${{ needs.release.outputs.version }}
          helm push hf-csi-driver-${{ needs.release.outputs.version }}.tgz oci://${{ env.REGISTRY }}/huggingface/charts
