apiVersion: v1
kind: Service
metadata:
  name: {{ include "hf-csi-driver.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hf-csi-driver.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  selector:
    app: hf-csi-webhook
  ports:
    - port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
