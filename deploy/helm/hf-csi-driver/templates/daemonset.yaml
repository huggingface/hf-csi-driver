apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "hf-csi-driver.fullname" . }}-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hf-csi-driver.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hf-csi-driver.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable }}
  template:
    metadata:
      labels:
        {{- include "hf-csi-driver.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.hostNetwork }}
      serviceAccountName: {{ include "hf-csi-driver.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hf-csi-plugin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(CSI_NODE_NAME)
            - --cache-dir={{ .Values.cacheDir }}
            - --mount-image={{ .Values.hfMount.image.repository }}:{{ .Values.hfMount.image.tag }}
            - --mount-pull-policy={{ .Values.hfMount.image.pullPolicy }}
            {{- with .Values.imagePullSecrets }}
            - --mount-pull-secrets={{ range $i, $s := . }}{{ if $i }},{{ end }}{{ $s.name }}{{ end }}
            {{- end }}
            - --mount-service-account={{ include "hf-csi-driver.fullname" . }}
            - --mount-host-network={{ .Values.hfMount.hostNetwork }}
            - --namespace={{ .Release.Namespace }}
            - --v={{ .Values.logVerbosity }}
          env:
            - name: CSI_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: plugin-dir
              mountPath: /csi
            - name: cache-dir
              mountPath: {{ .Values.cacheDir }}
            - name: mnt-dir
              mountPath: /var/lib/hf-csi-driver/mnt
              mountPropagation: Bidirectional
          ports:
            - containerPort: 9808
              name: healthz
              protocol: TCP
          # startupProbe gates liveness until the plugin is ready. The plugin
          # blocks on Kubernetes API and mount-pod-watcher init for ~30s on
          # cold pods (longer under control-plane load or rapid node scale-up),
          # so a 10s initialDelaySeconds livenessProbe with failureThreshold=3
          # was killing the container during its first health probe — taking
          # in-flight CSI mount RPCs down with it.
          startupProbe:
            httpGet:
              path: /healthz
              port: healthz
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            timeoutSeconds: 3
            periodSeconds: 10

        - name: node-driver-registrar
          image: {{ .Values.sidecars.nodeDriverRegistrar.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/hf.csi.huggingface.co/csi.sock
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration

        - name: liveness-probe
          image: {{ .Values.sidecars.livenessProbe.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --health-port=9808
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi

      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/hf.csi.huggingface.co/
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: cache-dir
          hostPath:
            path: {{ .Values.cacheDir }}
            type: DirectoryOrCreate
        - name: mnt-dir
          hostPath:
            path: /var/lib/hf-csi-driver/mnt
            type: DirectoryOrCreate
