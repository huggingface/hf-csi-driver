apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hf-csi-driver.fullname" . }}
  labels:
    {{- include "hf-csi-driver.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["hf.csi.huggingface.co"]
    resources: ["hfmounts", "hfmounts/status"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hf-csi-driver.fullname" . }}
  labels:
    {{- include "hf-csi-driver.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hf-csi-driver.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "hf-csi-driver.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
