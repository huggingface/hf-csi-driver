image:
  repository: ghcr.io/huggingface/hf-csi-driver
  # Overwritten at release time by .github/workflows/release.yml
  tag: latest
  pullPolicy: IfNotPresent

hfMount:
  image:
    repository: ghcr.io/huggingface/hf-mount-fuse
    # Overwritten at release time with the latest hf-mount release tag
    tag: latest
    pullPolicy: IfNotPresent
  hostNetwork: true

logVerbosity: 4

cacheDir: /var/lib/hf-csi-driver/cache

updateStrategy:
  maxUnavailable: "100%"

hostNetwork: true

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

webhook:
  enabled: false
  image:
    repository: ghcr.io/huggingface/hf-csi-driver
    # Overwritten at release time by .github/workflows/release.yml
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 9443

sidecars:
  nodeDriverRegistrar:
    image: public.ecr.aws/eks-distro/kubernetes-csi/node-driver-registrar:v2.13.0-eks-1-31-12
  livenessProbe:
    image: public.ecr.aws/eks-distro/kubernetes-csi/livenessprobe:v2.14.0-eks-1-31-12
