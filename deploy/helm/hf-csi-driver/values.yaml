image:
  repository: ghcr.io/huggingface/hf-csi-driver
  tag: v0.1.0
  pullPolicy: IfNotPresent

logVerbosity: 4

cacheDir: /var/lib/hf-csi-driver/cache

# Mount mode: "process" (child process) or "pod" (dedicated mount pods, survives driver restarts)
mountMode: pod

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

sidecars:
  nodeDriverRegistrar:
    image: public.ecr.aws/eks-distro/kubernetes-csi/node-driver-registrar:v2.13.0-eks-1-31-12
  livenessProbe:
    image: public.ecr.aws/eks-distro/kubernetes-csi/livenessprobe:v2.14.0-eks-1-31-12
