image:
  repository: ghcr.io/huggingface/hf-csi-driver
  tag: v0.1.0
  pullPolicy: IfNotPresent

logVerbosity: 4

# HuggingFace token - leave empty to only support public repos/buckets.
# Can also reference an existing secret with hfToken.existingSecret.
hfToken:
  value: ""
  existingSecret: ""
  existingSecretKey: token

cacheDir: /var/lib/hf-csi-driver/cache

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

sidecars:
  nodeDriverRegistrar:
    image: public.ecr.aws/eks-distro/kubernetes-csi/node-driver-registrar:v2.13.0-eks-1-31-12
  livenessProbe:
    image: public.ecr.aws/eks-distro/kubernetes-csi/livenessprobe:v2.14.0-eks-1-31-12
