apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hf-csi-driver
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hf-csi-driver
subjects:
  - kind: ServiceAccount
    name: hf-csi-driver
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: hf-csi-driver
  apiGroup: rbac.authorization.k8s.io
